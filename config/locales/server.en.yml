    revised_critique_max_revisions: "Maximum number of revisions an OP can add to a single topic. Replacing the latest revision does not count toward this limit."
    revised_critique_max_project_revisions: "Maximum number of project revisions an OP can add to a project critique topic. Replacing the latest revision does not count toward this limit."
    revised_critique_max_project_images: "Hard upper bound on images in a single project revision. Must not exceed 12."
    revised_critique_add_notice_reply: "After a revised image is added, post a notice reply to the topic."
    revised_critique_notice_reply_username: "Username that posts the notice reply. Defaults to \"system\". Set to any admin username to attribute the reply to them."
