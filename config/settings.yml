plugins:
  revised_critique_enabled:
    default: true
    client: true
  revised_critique_category_id:
    default: 0
    type: integer
    client: true
  revised_critique_button_label:
    default: "Share Revised Version"
    client: true
  revised_critique_title_marker:
    default: "(+revised)"
    client: false
  revised_critique_note_max_length:
    default: 500
    type: integer
    client: true
  revised_critique_heading:
    default: "Revised Version"
    client: false
  revised_critique_require_reply_from_other_user:
    default: true
    client: true
  revised_critique_max_revisions:
    default: 3
    type: integer
    client: true
    min: 1
  revised_critique_max_project_revisions:
    default: 3
    type: integer
    client: true
    min: 1
  revised_critique_max_project_images:
    default: 12
    type: integer
    client: true
    min: 1
    max: 12
  revised_critique_add_notice_reply:
    default: false
    client: false
  revised_critique_notice_reply_username:
    default: "system"
    client: false
